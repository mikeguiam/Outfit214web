<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit214web - Scout Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Creates the clean watermark overlay using the custom Outfit 214 logo image */
        .watermark-bg {
            position: relative;
        }
        .watermark-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('images.jfif');
            background-repeat: no-repeat;
            background-position: center;
            background-size: min(450px, 90%);
            opacity: 0.08; /* Keeps text completely readable over the logo */
            pointer-events: none;
            z-index: 0;
        }
        .watermark-content {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loginCard" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="flex flex-col items-center mb-6">
            <img src="images.jfif" alt="Outfit 214 Logo" class="w-24 h-24 object-contain mb-3 drop-shadow-md">
            <h2 class="text-2xl font-black text-slate-800 text-center">Outfit 214 Log In</h2>
            <p class="text-xs text-slate-400 mt-1">Victoria National High School</p>
        </div>
        
        <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="loginUsername" required placeholder="e.g., ScoutJuan" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            
            <div class="flex items-center mb-6">
                <input type="checkbox" id="loginRemember" class="w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 cursor-pointer">
                <label for="loginRemember" class="ml-2 text-sm text-slate-600 select-none cursor-pointer font-medium">Remember my credentials</label>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">Sign In</button>
        </form>
        <p class="mt-6 text-sm text-center text-slate-500">
            New Scout? <button onclick="switchView('signup')" class="text-emerald-600 hover:underline font-bold">Create an Account</button>
        </p>
    </div>

    <div id="signupCard" class="hidden bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="flex flex-col items-center mb-6">
            <img src="images.jfif" alt="Outfit 214 Logo" class="w-20 h-20 object-contain mb-2">
            <h2 class="text-2xl font-black text-slate-800 text-center">Scout Registration</h2>
            <p class="text-xs text-slate-400 mt-1">Join Victoria NHS Outfit 214</p>
        </div>
        
        <div id="signupError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold"></div>
        
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Full Name</label>
                <input type="text" id="signupName" required placeholder="Juan Dela Cruz" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Choose Username</label>
                <input type="text" id="signupUsername" required placeholder="No spaces allowed" pattern="^\S+$" title="Username cannot contain spaces" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="signupPassword" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">Register Profile</button>
        </form>
        <p class="mt-6 text-sm text-center text-slate-500">
            Already registered? <button onclick="switchView('login')" class="text-blue-600 hover:underline font-bold">Log In</button>
        </p>
    </div>

    <div id="portalContainer" class="watermark-bg hidden w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden min-h-[550px] border border-slate-100">
        <div class="watermark-content bg-gradient-to-r from-slate-800 to-slate-950 p-6 flex justify-between items-center text-white shadow-md">
            <div class="flex items-center space-x-4">
                <img src="images.jfif" alt="Outfit 214 Logo" class="w-12 h-12 object-contain bg-white/10 p-1 rounded-lg">
                <div>
                    <h2 class="text-2xl font-black tracking-tight text-emerald-400">Outfit 214 Portal</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Victoria National High School Council</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="bg-slate-700/50 hover:bg-red-600 hover:text-white border border-slate-600 px-4 py-2 rounded-lg font-bold text-sm transition duration-150">Log Out</button>
        </div>

        <div class="watermark-content p-8">
            <div id="profileSuccess" class="hidden mb-6 p-4 bg-emerald-100 text-emerald-800 rounded-xl text-sm font-bold shadow-sm">
                ✨ Profile changes successfully saved to council records!
            </div>
            
            <form id="profileForm" onsubmit="handleSaveProfile(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Full Name</label>
                        <input type="text" id="profileName" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Username Reference</label>
                        <input type="text" id="profileUsername" disabled class="w-full px-4 py-2.5 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg cursor-not-allowed font-mono text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">BSP Serial Number</label>
                        <input type="text" id="profileSerial" placeholder="e.g., BSP-2026-XXXX" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Rank in BSP</label>
                        <select id="profileRank" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg bg-white/90 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                            <option value="">-- Choose Rank --</option>
                            <option value="Membership Card Only">Membership Only</option>
                            <option value="Tenderfoot">Tenderfoot</option>
                            <option value="Second Class">Second Class</option>
                            <option value="First Class">First Class</option>
                            <option value="Star">Star</option>
                            <option value="Life">Life</option>
                            <option value="Eagle Scout">Eagle Scout</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-slate-700 text-sm font-bold mb-2">Complete Address</label>
                        <input type="text" id="profileAddress" placeholder="Barangay, Municipality/City, Province" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium bg-white/90">
                    </div>
                </div>
                <div class="mt-8 flex justify-end">
                    <button type="
