<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit214web - Scout Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Watermark overlay using the custom Outfit 214 logo image */
        .watermark-bg {
            position: relative;
        }
        .watermark-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('images.jfif');
            background-repeat: no-repeat;
            background-position: center;
            background-size: min(450px, 90%);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .watermark-content {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loginCard" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="flex flex-col items-center mb-6">
            <img src="images.jfif" alt="Outfit 214 Logo" class="w-24 h-24 object-contain mb-3 drop-shadow-md">
            <h2 class="text-2xl font-black text-slate-800 text-center">Outfit 214 Log In</h2>
            <p class="text-xs text-slate-400 mt-1">Victoria National High School</p>
        </div>
        
        <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="loginUsername" required placeholder="e.g., ScoutJuan" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="flex items-center mb-6">
                <input type="checkbox" id="loginRemember" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                <label for="loginRemember" class="ml-2 text-sm text-slate-600 select-none cursor-pointer font-medium">Remember my credentials</label>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">Sign In</button>
        </form>
        <p class="mt-6 text-sm text-center text-slate-500">
            New Scout? <button onclick="switchView('signup')" class="text-blue-600 hover:underline font-bold">Create an Account</button>
        </p>
    </div>

    <div id="signupCard" class="hidden bg-white p-8 rounded-xl shadow-2xl w-full max-w-xl border border-slate-100">
        <div class="flex flex-col items-center mb-6">
            <img src="images.jfif" alt="Outfit 214 Logo" class="w-20 h-20 object-contain mb-2">
            <h2 class="text-2xl font-black text-slate-800 text-center">Scout Registration</h2>
            <p class="text-xs text-slate-400 mt-1">Join Victoria NHS Outfit 214</p>
        </div>
        
        <div id="signupError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold"></div>
        
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2">First Name</label>
                    <input type="text" id="signupFirstName" required placeholder="Juan" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2">Middle Name</label>
                    <input type="text" id="signupMiddleName" placeholder="Agoncillo" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2">Last Name</label>
                    <input type="text" id="signupLastName" required placeholder="Dela Cruz" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Choose Username</label>
                <input type="text" id="signupUsername" required placeholder="No spaces allowed" pattern="^\S+$" title="Username cannot contain spaces" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Email Address <span class="text-xs text-slate-400 font-normal">(For verification)</span></label>
                <input type="email" id="signupEmail" required placeholder="scout@email.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">Register Profile</button>
        </form>
        <p class="mt-6 text-sm text-center text-slate-500">
            Already registered? <button onclick="switchView('login')" class="text-blue-600 hover:underline font-bold">Log In</button>
        </p>
    </div>

    <div id="portalContainer" class="watermark-bg hidden w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden min-h-[550px] border border-slate-100">
        
        <div class="watermark-content bg-gradient-to-r from-blue-700 via-indigo-900 to-red-600 p-6 flex justify-between items-center text-white shadow-md">
            <div class="flex items-center space-x-4">
                <img src="images.jfif" alt="Outfit 214 Logo" class="w-14 h-14 object-contain bg-white p-1 rounded-full shadow-inner">
                <div>
                    <h2 class="text-2xl font-black tracking-tight text-white drop-shadow-md">Outfit 214 Portal</h2>
                    <p class="text-xs text-blue-200 font-semibold uppercase tracking-wider mt-0.5">Victoria National High School</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="bg-white/10 hover:bg-red-700 hover:text-white border border-white/20 px-4 py-2 rounded-lg font-bold text-sm transition duration-150 backdrop-blur-sm">Log Out</button>
        </div>

        <div class="watermark-content p-8">
            <div id="profileSuccess" class="hidden mb-6 p-4 bg-blue-50 text-blue-800 border border-blue-200 rounded-xl text-sm font-bold shadow-sm">
                🔹 Profile changes successfully saved to council records!
            </div>
            
            <form id="profileForm" onsubmit="handleSaveProfile(event)">
                <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6 mb-8 pb-6 border-b border-slate-100">
                    <div class="relative w-28 h-28 rounded-full border-4 border-slate-200 bg-slate-100 overflow-hidden flex items-center justify-center shadow-md">
                        <img id="profilePreview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%2394a3b8'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z'/></svg>" class="w-full h-full object-cover">
                    </div>
                    <div class="text-center sm:text-left">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Official Scout Photo</label>
                        <p class="text-xs text-slate-400 mb-3">Upload a clean 2x2 clear portrait image (Max 1MB)</p>
                        <input type="file" id="profilePhotoInput" accept="image/*" onchange="previewAndConvertImage(event)" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 file:cursor-pointer hover:file:bg-blue-100">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">First Name</label>
                        <input type="text" id="profileFirstName" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Middle Name</label>
                        <input type="text" id="profileMiddleName" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Last Name</label>
                        <input type="text" id="profileLastName" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Username Reference</label>
                        <input type="text" id="profileUsername" disabled class="w-full px-4 py-2.5 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg cursor-not-allowed font-mono text-sm font-bold">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Verified Email Address</label>
                        <input type="email" id="profileEmail" disabled class="w-full px-4 py-2.5 border border-slate-200 bg-slate-50 text-slate-400 rounded-lg cursor-not-allowed font-medium">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Grade and Section</label>
                        <input type="text" id="profileGradeSection" placeholder="e.g., Grade 10 - Aguinaldo" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">BSP Serial Number</label>
                        <input type="text" id="profileSerial" placeholder="e.g., 03-09-0000000" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                    <div>
                        <label class="block text-slate-700 text-sm font-bold mb-2">Rank in BSP</label>
                        <select id="profileRank" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg bg-white/90 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                            <option value="">-- Choose Rank --</option>
                            <option value="Membership">Membership</option>
                            <option value="Explorer">Explorer</option>
                            <option value="Pathfinder">Pathfinder</option>
                            <option value="Outdoorsman">Outdoorsman</option>
                            <option value="Venturer">Venturer</option>
                            <option value="Eagle Scout">Eagle Scout</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-slate-700 text-sm font-bold mb-2">Complete Address</label>
                        <input type="text" id="profileAddress" placeholder="Barangay, Municipality/City, Province" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white/90">
                    </div>
                </div>
                <div class="mt-8 flex justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-8 py-3 rounded-xl transition duration-200 shadow-md tracking-wide">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentBase64Photo = "";
        const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%2394a3b8'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z'/></svg>";

        if (!localStorage.getItem('clean_bsp_database')) {
            localStorage.setItem('clean_bsp_database', JSON.stringify({}));
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('bsp_remember_me') === 'true') {
                document.getElementById('loginUsername').value = localStorage.getItem('bsp_remembered_user') || '';
                document.getElementById('loginPassword').value = localStorage.getItem('bsp_remembered_pass') || '';
                document.getElementById('loginRemember').checked = true;
            }
            checkCurrentSession();
        });

        function checkCurrentSession() {
            const activeUser = sessionStorage.getItem('bsp_active_session');
            if (activeUser) {
                let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
                if (users && users[activeUser]) {
                    loadProfileData(activeUser);
                    switchView('portal');
                    return;
                }
            }
            switchView('login');
        }

        function switchView(view) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('signupCard').classList.add('hidden');
            document.getElementById('portalContainer').classList.add('hidden');

            if (view === 'login') document.getElementById('loginCard').classList.remove('hidden');
            if (view === 'signup') document.getElementById('signupCard').classList.remove('hidden');
            if (view === 'portal') document.getElementById('portalContainer').classList.remove('hidden');
        }

        function handleSignup(e) {
            e.preventDefault();
            const firstName = document.getElementById('signupFirstName').value.trim();
            const middleName = document.getElementById('signupMiddleName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            
            const username = document.getElementById('signupUsername').value.toLowerCase().trim();
            const email = document.getElementById('signupEmail').value.toLowerCase().trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const errorDiv = document.getElementById('signupError');

            if (password !== confirmPassword) {
                errorDiv.textContent = "Passwords do not match. Please re-enter carefully.";
                errorDiv.classList.remove('hidden');
                document.getElementById('signupConfirmPassword').focus();
                return;
            }

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            
            if (users[username]) {
                errorDiv.textContent = "This username is already taken.";
                errorDiv.classList.remove('hidden');
                return;
            }
            
            for (let key in users) {
                if (users[key].email === email) {
                    errorDiv.textContent = "This email address is already registered.";
                    errorDiv.classList.remove('hidden');
                    return;
                }
            }

            const combinedFullName = middleName ? `${lastName}, ${firstName} ${middleName}` : `${lastName}, ${firstName}`;

            users[username] = { 
                name: combinedFullName,
                firstName: firstName,
                middleName: middleName,
                lastName: lastName,
                email: email, 
                password: password, 
                gradeSection: '',
                serial: '', 
                rank: '', 
                address: '', 
                photo: '' 
            };
            
            localStorage.setItem('clean_bsp_database', JSON.stringify(users));
            
            document.getElementById('signupForm').reset();
            alert('Scout account created successfully! You can now log in.');
            switchView('login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.toLowerCase().trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('loginRemember').checked;
            const errorDiv = document.getElementById('loginError');

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));

            if (users[username] && users[username].password === password) {
                errorDiv.classList.add('hidden');
                
                if (rememberMe) {
                    localStorage.setItem('bsp_remember_me', 'true');
                    localStorage.setItem('bsp_remembered_user', username);
                    localStorage.setItem('bsp_remembered_pass', password);
                } else {
                    localStorage.removeItem('bsp_remember_me');
                    localStorage.removeItem('bsp_remembered_user');
                    localStorage.removeItem('bsp_remembered_pass');
                }

                sessionStorage.setItem('bsp_active_session', username);
                loadProfileData(username);
                switchView('portal');
            } else {
                errorDiv.textContent = "Invalid username or incorrect password.";
                errorDiv.classList.remove('hidden');
            }
        }

        function previewAndConvertImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 1024 * 1024) {
                alert("File size is too large! Please upload an image smaller than 1MB.");
                event.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 200; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentBase64Photo = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('profilePreview').src = currentBase64Photo;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function loadProfileData(username) {
            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            let data = users[username];
            if (!data) return handleLogout();

            if (data.firstName) {
                document.getElementById('profileFirstName').value = data.firstName;
                document.getElementById('profileMiddleName').value = data.middleName || '';
                document.getElementById('profileLastName').value = data.lastName;
            } else {
                const parts = (data.name || '').split(',');
                if(parts.length > 1) {
                    document.getElementById('profileLastName').value = parts[0].trim();
                    const frontParts = parts[1].trim().split(' ');
                    document.getElementById('profileFirstName').value = frontParts[0] || '';
                    document.getElementById('profileMiddleName').value = frontParts.slice(1).join(' ') || '';
                } else {
                    document.getElementById('profileFirstName').value = data.name || '';
                    document.getElementById('profileMiddleName').value = '';
                    document.getElementById('profileLastName').value = '';
                }
            }

            document.getElementById('profileUsername').value = username;
            document.getElementById('profileEmail').value = data.email || '';
            document.getElementById('profileGradeSection').value = data.gradeSection || '';
            document.getElementById('profileSerial').value = data.serial || '';
            document.getElementById('profileRank').value = data.rank || '';
            document.getElementById('profileAddress').value = data.address || '';
            
            currentBase64Photo = data.photo || "";
            document.getElementById('profilePreview').src = currentBase64Photo || defaultAvatar;
            document.getElementById('profilePhotoInput').value = "";
        }

        function handleSaveProfile(e) {
            e.preventDefault();
            const username = sessionStorage.getItem('bsp_active_session');
            if (!username) return handleLogout();

            let users = JSON.parse(localStorage.getItem('clean_bsp_database'));
            if (users[username]) {
                const fName = document.getElementById('profileFirstName').value.trim();
                const mName = document.getElementById('profileMiddleName').value.trim();
                const lName = document.getElementById('profileLastName').value.trim();
                
                users[username].firstName = fName;
                users[username].middleName = mName;
                users[username].lastName = lName;
                
                users[username].name = mName ? `${lName}, ${fName} ${mName}` : `${lName}, ${fName}`;
                
                users[username].gradeSection = document.getElementById('profileGradeSection').value.trim();
                users[username].serial = document.getElementById('profileSerial').value;
                users[username].rank = document.getElementById('profileRank').value;
                users[username].address = document.getElementById('profileAddress').value;
                users[username].photo = currentBase64Photo;

                localStorage.setItem('clean_bsp_database', JSON.stringify(users));

                const successDiv = document.getElementById('profileSuccess');
                successDiv.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(() => successDiv.className = "hidden", 3000);
            }
        }

        function handleLogout() {
            sessionStorage.removeItem('bsp_active_session');
            currentBase64Photo = "";
            switchView('login');
            if (localStorage.getItem('bsp_remember_me') === 'true') {
                document.getElementById('loginUsername').value = localStorage.getItem('bsp_remembered_user') || '';
                document.getElementById('loginPassword').value = localStorage.getItem('bsp_remembered_pass') || '';
            } else {
                document.getElementById('loginForm').reset();
            }
        }
        
        window.addEventListener('storage', (e) => {
            if (e.key === 'clean_bsp_database') {
                const activeUser = sessionStorage.getItem('bsp_active_session');
                if (activeUser) {
                    let database = JSON.parse(e.newValue) || {};
                    if (!database[activeUser]) {
                        alert('Your account profile has been modified or removed by administration.');
                        handleLogout();
                    }
                }
            }
        });
    </script>
</body>
</html>
