<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSP Master Council Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- ADMIN LOCKOUT FORM -->
    <div id="adminGateCard" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <span class="text-3xl">🛡️</span>
            <h2 class="text-2xl font-black text-slate-800 mt-2">Admin Terminal</h2>
            <p class="text-slate-400 text-xs mt-1">Authorized Council Access Only</p>
        </div>
        <div id="gateError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-semibold"></div>
        
        <form onsubmit="verifyAdminGate(event)">
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-bold mb-2">Master Admin Password</label>
                <input type="password" id="gateKey" required placeholder="••••••••" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-center tracking-widest text-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-lg transition">Initialize Master Directory</button>
        </form>
    </div>

    <!-- ADMIN CENTRAL OVERVIEW -->
    <div id="adminDashboard" class="hidden w-full max-w-6xl bg-white rounded-2xl shadow-2xl overflow-hidden min-h-[500px]">
        <div class="bg-gradient-to-r from-slate-800 to-slate-950 p-6 flex justify-between items-center text-white">
            <div>
                <h2 class="text-2xl font-black tracking-tight text-amber-400">BSP Master Roster</h2>
                <p class="text-xs text-slate-400">Monitoring all live registered scout profiles</p>
            </div>
            <button onclick="lockTerminal()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/30 px-4 py-2 rounded-lg font-bold text-xs transition">Lock Terminal</button>
        </div>

        <div class="p-8">
            <!-- Summary Stats Counters -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Total Registered Accounts</p>
                    <p id="statCount" class="text-3xl font-black text-slate-800 mt-1">0</p>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                    <p class="text-emerald-600 text-xs font-bold uppercase tracking-wider">Active Database Status</p>
                    <p class="text-xl font-bold text-emerald-800 mt-2 flex items-center">
                        <span id="liveStatusDot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-2"></span> 
                        <span id="liveStatusText">Connected Live</span>
                    </p>
                </div>
            </div>

            <!-- Master Data Spreadsheet -->
            <div class="border border-slate-200 rounded-xl overflow-x-auto bg-white shadow-sm">
                <table class="w-full border-collapse text-left text-sm text-slate-500 min-w-[900px]">
                    <thead class="bg-slate-50 text-xs text-slate-700 uppercase font-bold border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-3">Scout Name</th>
                            <th class="px-6 py-3">Email Contact</th>
                            <th class="px-6 py-3">BSP Serial Number</th>
                            <th class="px-6 py-3">Current Rank</th>
                            <th class="px-6 py-3">Complete Address</th>
                            <th class="px-6 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody" class="divide-y divide-slate-200">
                        <!-- Data rows appear automatically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isDashboardUnlocked = false;

        // Admin security key check
        function verifyAdminGate(e) {
            e.preventDefault();
            const key = document.getElementById('gateKey').value;
            const errorDiv = document.getElementById('gateError');

            if (key === 'admin1234') {
                errorDiv.classList.add('hidden');
                document.getElementById('adminGateCard').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                isDashboardUnlocked = true;
                loadMasterData();
            } else {
                errorDiv.textContent = "Security clearance check failed. Access Denied.";
                errorDiv.classList.remove('hidden');
            }
        }

        function loadMasterData() {
            const tbody = document.getElementById('masterTableBody');
            const statCount = document.getElementById('statCount');
            tbody.innerHTML = '';

            // Pull direct active profiles from the shared local container
            let database = JSON.parse(localStorage.getItem('clean_bsp_database')) || {};
            let emails = Object.keys(database);
            
            statCount.textContent = emails.length;

            if (emails.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-sm text-slate-400 italic">
                            No scouts have registered profiles in the index website yet.
                        </td>
                    </tr>
                `;
                return;
            }

            emails.forEach(email => {
                const u = database[email];
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition";
                row.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-900">${u.name}</td>
                    <td class="px-6 py-4 text-xs font-mono text-slate-500">${email}</td>
                    <td class="px-6 py-4 text-slate-700 font-semibold">${u.serial || '<span class="text-slate-300 italic">None Set</span>'}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-0.5 rounded text-xs font-bold ${u.rank === 'Eagle Scout' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}">
                            ${u.rank || 'Unassigned'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-600 max-w-xs truncate">${u.address || '<span class="text-slate-300 italic">None Set</span>'}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="deleteAccount('${email}', '${u.name.replace(/'/g, "\\'")}')" class="bg-red-50 hover:bg-red-600 text-red-600 hover:text-white border border-red-200 hover:border-red-600 px-3 py-1 rounded text-xs font-bold transition duration-150">
                            Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Action Function: Deletes a user profile cleanly from the shared pool
        function deleteAccount(email, name) {
            if (confirm(`Are you sure you want to permanently delete the profile for scout: ${name}? This action cannot be undone.`)) {
                let database = JSON.parse(localStorage.getItem('clean_bsp_database')) || {};
                
                if (database[email]) {
                    delete database[email];
                    localStorage.setItem('clean_bsp_database', JSON.stringify(database));
                    
                    // Instantly recalculate current admin page values
                    loadMasterData();
                    triggerFlashFeedback("Account Deleted Successfully");
                }
            }
        }

        // Helper function to animate the status indicator bar
        function triggerFlashFeedback(text) {
            const statusDot = document.getElementById('liveStatusDot');
            const statusText = document.getElementById('liveStatusText');
            
            statusText.textContent = text;
            statusText.className = "text-xl font-bold text-red-600 mt-2 flex items-center";
            statusDot.className = "w-2 h-2 rounded-full bg-red-500 animate-ping mr-2";
            
            setTimeout(() => {
                statusText.textContent = "Connected Live";
                statusText.className = "text-xl font-bold text-emerald-800 mt-2 flex items-center";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-2";
            }, 2500);
        }

        // LIVE REFRESH EVENT LISTENER: Catches background actions executing from index.html pages
        window.addEventListener('storage', function(event) {
            if (event.key === 'clean_bsp_database' && isDashboardUnlocked) {
                loadMasterData();
                triggerFlashFeedback("Data Updated Live!");
            }
        });

        function lockTerminal() {
            isDashboardUnlocked = false;
            document.getElementById('gateKey').value = '';
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminGateCard').classList.remove('hidden');
        }
    </script>
</body>
</html>
